http:
  middlewares:
    authelia:
      forwardAuth:
        address: http://authelia:9091/api/verify?rd=https://auth.market-mitra.online/
        trustForwardHeader: true
        authResponseHeaders:
          - Remote-User
          - Remote-Groups
          - Remote-Email
          - Remote-Name

    api-key-auth:
      forwardAuth:
        address: http://api-key-validator:8080/validate
        trustForwardHeader: true
        authResponseHeaders:
          - Remote-User
          - Remote-Groups
    
    enterprise-security:
      headers:
        # 1. Fixes: X-Content-Type-Options
        contentTypeNosniff: true
        
        # 2. Fixes: X-Frame-Options (Prevents clickjacking)
        frameDeny: true
        
        accessControlAllowMethods:
          - "GET"
          - "OPTIONS"
          - "POST"
        accessControlAllowOriginList:
          - "https://prefect.market-mitra.online"
          - "https://auth.market-mitra.online"
      
        # 4. Fixes: Strict Transport Security (HSTS)
        # 31536000 = 1 year. Includes subdomains and allows preloading.
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        forceSTSHeader: true

        # 5. Fixes: Content Security Policy (CSP)
        # Note: This is a strict policy. If your site uses external scripts 
        # (like Google Analytics), you must add their domains below.
        # contentSecurityPolicy: "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; frame-ancestors 'none'; object-src 'none';"

        # Bonus: Browser XSS Filter (though largely superseded by CSP)
        browserXssFilter: true